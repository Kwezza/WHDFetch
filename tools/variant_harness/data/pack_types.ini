; PACK_TYPES.INI
; Defines WHDLoad pack types and their metadata field mappings.
; Format: ID = DisplayName|Abbreviation|SearchQuerySnippet|DatName|FieldList

[PackTypes]
1 = Games|Games|Commodore%20Amiga%20-%20WHDLoad%20-%20Games%20(|Game|sps,publisher,version,chipset,contributors,crack_groups,disks,language,media,memory,software_houses,video,cover_disks,compilations,variant_tags
2 = Demos|Demo|Commodore%20Amiga%20-%20WHDLoad%20-%20Demos%20(|Demo|scene_group,version
3 = Magazines|Magazines|Commodore%20Amiga%20-%20WHDLoad%20-%20Magazines%20(|Mags|issue,magazines,chipset
4 = Games-Beta & Unofficial|Games beta|Commodore%20Amiga%20-%20WHDLoad%20-%20Games%20-%20Beta%20&amp;%20Unofficial%20(|GamB|sps,publisher,version,chipset,contributors,crack_groups,disks,language,media,memory,software_houses,video,variant_tags
5 = Demos-Beta & Unofficial|Demos beta|Commodore%20Amiga%20-%20WHDLoad%20-%20Demos%20-%20Beta%20&amp;%20Unofficial%20(|DemB|scene_group,version

[FieldAttributes]
contributors.allow_multiple = true
crack_groups.allow_multiple = true
scene_group.allow_multiple = true
sps.allow_multiple = true
; Generic prescan configuration
contributors.prescan.enabled = true
contributors.prescan.order = 10
contributors.prescan.source = contributors
contributors.prescan.multi_token = true
contributors.prescan.remove_from_filename = true
contributors.prescan.allow_multiple = true

variant_tags.prescan.enabled = true
; Run variant_tags before contributors so overlapping tokens like 'Kernal_Version' map here
variant_tags.prescan.order = 5
variant_tags.prescan.source = variant_tags
variant_tags.prescan.multi_token = true
variant_tags.prescan.remove_from_filename = true
variant_tags.prescan.allow_multiple = false
