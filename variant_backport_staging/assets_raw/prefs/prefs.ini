# WHD Downloader 2 Preferences
# Default configuration file for WHD Downloader 2
# Lines starting with # are comments

# Network Settings
# ================
# Base URL for downloading WHDLoad packs
server_url=http://ftp2.grandis.nu/turran/FTP/Retroplay%20WHDLoad%20Packs/

# Maximum number of download retries on failure
max_retries=3

# Network timeout in seconds
timeout_sec=20

# Path Settings
# =============
# Location to save downloaded index files (platform-specific)
index_path_amiga=PROGDIR:temp/net/index.html
index_path_host=temp/net/index.html

# XML metadata cache directory (platform-specific)
xml_cache_dir_amiga=PROGDIR:temp/xml
xml_cache_dir_host=temp/xml

# WHDLoad pack download cache (platform-specific)
whdpack_cache_dir_amiga=PROGDIR:temp/whdpacks
whdpack_cache_dir_host=temp/whdpacks

# WHDLoad pack extraction directory (platform-specific)
whdpack_extract_dir_amiga=WORK:WHDExtract
whdpack_extract_dir_host=WHDExtract

# Temporary ZIP download location (platform-specific)
zip_temp_location_amiga=PROGDIR:temp/zip
zip_temp_location_host=temp/zip

# Dat file location (platform-specific)
dat_file_location_amiga=PROGDIR:temp/dat_files
dat_file_location_host=temp/dat_files

# Extraction and Download Settings
# =================================
# Automatically extract downloaded packs
auto_extract=true

# Number of parallel downloads (1 = sequential)
parallel_downloads=1

# Verify CRC checksums of downloaded files
verify_crc=true

# Logging Settings
# ================
# Log level: 0=none, 1=errors, 2=warnings, 3=info, 4=debug
log_level=1
video_mask=3

# Filter & Scoring Preferences (Phase 4 Testing)
# ---------------------------------------------
# Active profile id (maps to profiles/<id>.profile). If empty, legacy Filter.* keys used.
active_profile=pal_aga_4mb
# Legacy Filter.* keys removed in favor of external profile.
# To revert, clear active_profile and re-add keys.
Filter.debug=true
